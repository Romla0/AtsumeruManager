name: Build Native Windows Executable (GluonFX, Java 17)

on:
  push:
    branches: [ "main" ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GraalVM (Java 17)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          version: '23.0.2'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: 'gradle'

      - name: Check versions
        run: |
          java --version
          native-image --version

      - name: Create gradle.properties with GraalVM path
        run: |
          echo "WINDOWS_GRAALVM_SDK_PATH=${{ env.JAVA_HOME }}" > gradle.properties
          echo "LINUX_GRAALVM_SDK_PATH=" >> gradle.properties
          echo "MACOSX_GRAALVM_SDK_PATH=" >> gradle.properties
        shell: bash

      - name: Build native image with GluonFX
        run: ./gradlew nativeBuild --no-daemon
        shell: bash

      - name: Upload native executable
        uses: actions/upload-artifact@v4
        with:
          name: AtsumeruManager-Windows-x64
          path: build/gluonfx/x86_64-windows/*.exe
