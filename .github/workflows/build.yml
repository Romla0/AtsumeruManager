name: Build AtsumeruManager

on:
  push:
    branches: [ "main" ]       # или ваша основная ветка
    tags: [ 'v*' ]             # запускать при создании тегов (например, v1.0)
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest     # можно также windows-latest, но для JAR ОС не важна

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Fat JAR with Shadow
        run: ./gradlew shadowJar

      - name: Upload Fat JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: AtsumeruManager-FatJar
          path: build/libs/*.jar
